services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-summarization}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-summarization}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-summarization}"]
      interval: 5s
      timeout: 3s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    # Blob-only mode; --loose relaxes strict account validation for dev
    command: azurite-blob --blobHost 0.0.0.0 --loose
    ports:
      - "10000:10000"
    volumes:
      - azuritedata:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10000"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth:
    build: ./auth-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-summarization}:${POSTGRES_PASSWORD:-localdev}@db:5432/${POSTGRES_DB:-summarization}
      BETTER_AUTH_URL: http://localhost:3001
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-changeme-generate-with-openssl-rand-hex-32}
      FRONTEND_URL: http://localhost:3000
      PORT: "3001"
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-summarization}:${POSTGRES_PASSWORD:-localdev}@db:5432/${POSTGRES_DB:-summarization}
      AUTH_SIDECAR_URL: http://auth:3001
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      WORKERS: "1"
      # Azurite local dev account — this is a publicly documented development key, not a real secret.
      # See: https://learn.microsoft.com/azure/storage/common/storage-use-azurite#well-known-storage-account-and-key
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=<AZURITE_DEV_KEY>;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      AZURE_STORAGE_CONTAINER_NAME: summarization-uploads
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
      azurite:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8001
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  azuritedata:
