# Alembic Configuration for SummarizationTool
#
# The sqlalchemy.url is overridden at runtime by alembic/env.py
# which reads DATABASE_URL from the environment.

[alembic]
script_location = alembic
prepend_sys_path = .

# Use the generic single-database configuration
# NOTE: This placeholder is overridden at runtime by alembic/env.py
# which reads DATABASE_URL from the environment / .env file.
# Do NOT put real credentials here — they will be committed to git.
sqlalchemy.url = postgresql://user:pass@localhost:5432/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
