  <rect class="page" width="1500" height="980" />
  <rect class="frame" x="26" y="18" width="1188" height="922" />

  <text class="title" x="58" y="62">AI Document Summarization Tool</text>
  <text class="subtitle" x="58" y="88">Global architecture for document ingestion, extraction, evaluation, collaboration, persistence, authentication, and operations.</text>

