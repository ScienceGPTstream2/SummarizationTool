<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">AI Document Summarization Tool global architecture</title>
  <desc id="desc">Clear global architecture diagram for the AI Document Summarization Tool showing user entry points, frontend, API boundary, workflow services, data stores, deployment runtime, and external integrations.</desc>
  <defs>
    <style>
      .page { fill: #ffffff; }
      .frame { fill: #f3f8fa; stroke: #0b6f95; stroke-width: 2.2; rx: 30; }
      .band { fill: #e6f1f5; stroke: #0b6f95; stroke-width: 1.5; rx: 14; }
      .band-soft { fill: #f0f7f9; stroke: #0b6f95; stroke-width: 1.4; rx: 14; }
      .external { fill: #ffffff; stroke: #0b6f95; stroke-width: 1.8; rx: 18; }
