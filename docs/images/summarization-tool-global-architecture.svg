      .node-blue { fill: #c5dfea; stroke: #0b6f95; stroke-width: 1.4; rx: 10; }
      .node-green { fill: #cde8dc; stroke: #0b6f95; stroke-width: 1.4; rx: 10; }
      .node-purple { fill: #dedcf0; stroke: #0b6f95; stroke-width: 1.4; rx: 10; }
      .node-gold { fill: #ece3ad; stroke: #0b6f95; stroke-width: 1.4; rx: 10; }
      .node-data { fill: #c7e0e9; stroke: #0b6f95; stroke-width: 1.4; rx: 10; }
      .title { font: 760 32px Segoe UI, Arial, sans-serif; fill: #102f43; }
      .subtitle { font: 400 15px Segoe UI, Arial, sans-serif; fill: #3f5b6e; }
      .band-title { font: 700 20px Segoe UI, Arial, sans-serif; fill: #102f43; }
      .node-title { font: 650 15px Segoe UI, Arial, sans-serif; fill: #102f43; }
      .node-text { font: 400 12.5px Segoe UI, Arial, sans-serif; fill: #334155; }
      .external-title { font: 700 18px Segoe UI, Arial, sans-serif; fill: #111827; }
      .external-text { font: 400 14px Segoe UI, Arial, sans-serif; fill: #374151; }
      .note { font: 400 12px Segoe UI, Arial, sans-serif; fill: #475569; }
      .caption { font: 760 24px Segoe UI, Arial, sans-serif; fill: #102f43; }
      .arrow { stroke: #0b5d7d; stroke-width: 3.1; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #0b5d7d; stroke-width: 2.3; fill: none; marker-end: url(#arrowSmall); }
      .arrow-dashed { stroke: #0b5d7d; stroke-width: 2.2; fill: none; marker-end: url(#arrowSmall); stroke-dasharray: 7 8; }
