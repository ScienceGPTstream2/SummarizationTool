<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Entity extraction and grounding workflow</title>
  <desc id="desc">Workflow for loading processed markdown, augmenting it with figure context, running one LLM extraction per entity, normalizing results, matching references to bounding boxes, and persisting extraction rows.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Segoe UI, Arial, sans-serif; fill: #475569; }
      .section { font: 700 13px Segoe UI, Arial, sans-serif; fill: #334155; letter-spacing: .04em; }
      .box-title { font: 700 15px Segoe UI, Arial, sans-serif; fill: #111827; }
      .box-text { font: 400 12px Segoe UI, Arial, sans-serif; fill: #374151; }
      .small { font: 400 11px Segoe UI, Arial, sans-serif; fill: #475569; }
      .card { stroke: #cbd5e1; stroke-width: 1.4; rx: 12; }
      .api { fill: #e0f2fe; }
      .doc { fill: #dcfce7; }
      .llm { fill: #fee2e2; }
      .ground { fill: #fef3c7; }
      .db { fill: #fae8ff; }
      .out { fill: #e2e8f0; }
      .lane { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 18; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow-soft); stroke-dasharray: 6 6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect class="bg" width="1280" height="820" />
  <text class="title" x="44" y="48">Entity Extraction and Reference Grounding</text>
  <text class="subtitle" x="44" y="74">The backend separates answer generation from visual grounding: providers return text and references, then processor-specific matchers attach boxes.</text>

  <rect class="lane" x="32" y="108" width="1216" height="118" />
  <text class="section" x="52" y="136">REQUEST AND DOCUMENT CONTEXT</text>
  <rect class="card api" x="64" y="158" width="210" height="46" />
  <text class="box-title" x="84" y="181">POST /api/extract</text>
  <text class="box-text" x="84" y="199">session, file hash, entities, model</text>
  <rect class="card doc" x="326" y="158" width="230" height="46" />
  <text class="box-title" x="346" y="181">Load markdown</text>
  <text class="box-text" x="346" y="199">raw_analysis.content or document.md</text>
  <rect class="card doc" x="608" y="158" width="230" height="46" />
  <text class="box-title" x="628" y="181">Add figure context</text>
  <text class="box-text" x="628" y="199">captions and generated summaries</text>
  <rect class="card out" x="890" y="158" width="230" height="46" />
  <text class="box-title" x="910" y="181">Enhanced markdown</text>
  <text class="box-text" x="910" y="199">document plus figures section</text>
  <path class="arrow" d="M274 181 H326" />
  <path class="arrow" d="M556 181 H608" />
  <path class="arrow" d="M838 181 H890" />

  <rect class="lane" x="32" y="254" width="1216" height="210" />
  <text class="section" x="52" y="282">PER-ENTITY CONCURRENT WORK</text>
  <rect class="card api" x="64" y="322" width="180" height="78" />
  <text class="box-title" x="84" y="345">Entity tasks</text>
  <text class="box-text" x="84" y="365">async gather for cloud</text>
  <text class="box-text" x="84" y="384">semaphore limit 48</text>
  <rect class="card llm" x="294" y="322" width="210" height="78" />
  <text class="box-title" x="314" y="345">LLMService call</text>
  <text class="box-text" x="314" y="365">provider dispatch by model_type</text>
  <text class="box-text" x="314" y="384">Macbook processed sequentially</text>
  <rect class="card llm" x="554" y="322" width="210" height="78" />
  <text class="box-title" x="574" y="345">Provider response</text>
  <text class="box-text" x="574" y="365">answer/content plus references</text>
  <text class="box-text" x="574" y="384">meta tokens and duration</text>
  <rect class="card out" x="814" y="322" width="210" height="78" />
  <text class="box-title" x="834" y="345">Normalize result</text>
  <text class="box-text" x="834" y="365">stable entity payload</text>
  <text class="box-text" x="834" y="384">cost estimated from meta</text>
  <path class="arrow" d="M154 204 V322" />
  <path class="arrow" d="M244 361 H294" />
  <path class="arrow" d="M504 361 H554" />
  <path class="arrow" d="M764 361 H814" />

  <rect class="lane" x="32" y="492" width="1216" height="168" />
  <text class="section" x="52" y="520">REFERENCE GROUNDING</text>
  <rect class="card doc" x="70" y="552" width="222" height="66" />
  <text class="box-title" x="90" y="575">Load raw analysis</text>
  <text class="box-text" x="90" y="595">processor artifact from blob/cache</text>
  <rect class="card ground" x="350" y="536" width="222" height="98" />
  <text class="box-title" x="370" y="559">Azure matcher</text>
  <text class="box-text" x="370" y="579">paragraph and line matching</text>
  <text class="box-text" x="370" y="598">figure reference expansion</text>
  <text class="box-text" x="370" y="617">bounding regions retained</text>
  <rect class="card ground" x="630" y="536" width="222" height="98" />
  <text class="box-title" x="650" y="559">Docling matcher</text>
  <text class="box-text" x="650" y="579">paragraph and page matching</text>
  <text class="box-text" x="650" y="598">polygon extraction</text>
  <text class="box-text" x="650" y="617">normalized output shape</text>
  <rect class="card out" x="910" y="552" width="222" height="66" />
  <text class="box-title" x="930" y="575">Grounded references</text>
  <text class="box-text" x="930" y="595">page, polygon, matched text</text>
  <path class="arrow" d="M919 400 C912 458 220 500 181 552" />
  <path class="arrow" d="M292 585 H350" />
  <path class="arrow" d="M572 585 H630" />
  <path class="arrow" d="M852 585 H910" />

  <rect class="lane" x="32" y="688" width="1216" height="88" />
  <text class="section" x="52" y="716">PERSISTENCE AND RESPONSE</text>
  <rect class="card db" x="174" y="730" width="260" height="34" />
  <text class="box-text" x="196" y="752">SessionService.add_extraction_result_fast()</text>
  <rect class="card db" x="486" y="730" width="240" height="34" />
  <text class="box-text" x="508" y="752">upsert by document, entity, model</text>
  <rect class="card out" x="778" y="730" width="250" height="34" />
  <text class="box-text" x="800" y="752">return extracted_entities payload</text>
  <path class="arrow" d="M1021 618 C1010 684 380 708 304 730" />
  <path class="arrow" d="M434 747 H486" />
  <path class="arrow" d="M726 747 H778" />
</svg>
