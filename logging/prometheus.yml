global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: summarization-backend
    scheme: https
    # Replace with your actual Container App FQDN
    static_configs:
      - targets:
          - "${BACKEND_FQDN}"
    metrics_path: /metrics
    tls_config:
      insecure_skip_verify: false
    # Increase timeout for cold scrapes
    scrape_timeout: 10s
