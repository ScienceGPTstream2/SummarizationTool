gitleaks-full-test:
  name: Gitleaks (Full history test)
  if: github.event_name == 'workflow_dispatch'
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Run full scan (non-blocking)
      continue-on-error: true
      uses: gitleaks/gitleaks-action@v2
      with:
        args: detect --redact --log-opts="--all"
