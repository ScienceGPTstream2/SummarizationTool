name: Gitleaks Full Test1

on:
  workflow_dispatch:

jobs:
  gitleaks-full-test:
    name: Gitleaks (Full history test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Run full scan (non-blocking)
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --redact --log-opts="--all"
