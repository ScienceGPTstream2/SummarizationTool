name: Deploy to A100 VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest repo
        run: |
          cd ~/SummarizationTool
          git fetch origin main
          git reset --hard origin/main

      - name: Restart Supabase stack if supabase-docker changed
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push – skipping supabase-docker check."
          else
            CHANGED=$(git diff --name-only "$BEFORE" HEAD -- supabase-docker/ 2>/dev/null | wc -l)
            if [ "$CHANGED" -gt "0" ]; then
              echo "supabase-docker changes detected ($CHANGED files) – running docker compose up -d"
              cd ~/SummarizationTool/supabase-docker
              docker compose up -d
            else
              echo "No changes in supabase-docker, skipping."
            fi
          fi

      - name: Install backend deps
        run: |
          cd ~/SummarizationTool/backend
          source ./venv/bin/activate
          pip install -r requirements.txt

      - name: Install frontend deps
        run: |
          cd ~/SummarizationTool
          npm ci

      - name: Build frontend
        run: |
          cd ~/SummarizationTool
          npm run build

      - name: Restart services
        run: |
          sudo systemctl restart summarization-backend
          sudo systemctl restart summarization-frontend

      - name: Health check
        run: |
          sleep 5
          sudo systemctl is-active summarization-backend
          sudo systemctl is-active summarization-frontend
