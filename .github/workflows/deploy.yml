name: Deploy to A100 VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest repo
        run: |
          cd ~/SummarizationTool
          git pull

      - name: Install backend deps
        run: |
          cd ~/SummarizationTool/backend
          source ./venv/bin/activate
          pip install -r requirements.txt

      - name: Install frontend deps
        run: |
          cd ~/SummarizationTool/frontend
          npm install

      - name: Restart services
        run: |
          sudo systemctl restart summarization-backend
          sudo systemctl restart summarization-frontend
