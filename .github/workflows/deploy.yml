name: Build & Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

# ---------------------------------------------------------------------------
# GitHub Actions Secrets required:
#
#   ACR_NAME                       Azure Container Registry name
#   ACR_USERNAME                   ACR admin username
#   ACR_PASSWORD                   ACR admin password
#   AZURE_RESOURCE_GROUP           Resource group name
#   AZURE_SUBSCRIPTION_ID          Azure subscription ID
#   AZURE_CLIENT_ID                Managed identity client ID (OIDC)
#   AZURE_TENANT_ID                Tenant ID (OIDC)
#   STAGING_CONTAINER_APP_NAME     Container App name for staging
#   STAGING_FRONTEND_APP_NAME      App Service name for staging frontend
#   STAGING_CONTAINER_APP_HOSTNAME Hostname of staging Container App
#
# Production secrets (used by promote.yml, not this workflow):
#   PROD_CONTAINER_APP_NAME        Container App name for production
#   PROD_FRONTEND_APP_NAME         App Service name for production frontend
# ---------------------------------------------------------------------------

permissions:
  id-token: write
  contents: read

jobs:
  # ── Build & push backend image ────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend
        run: |
          IMAGE="${{ secrets.ACR_NAME }}.azurecr.io/summarization-backend"
          docker build -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" ./backend
          docker push "${IMAGE}" --all-tags

  # ── Build & push auth image ───────────────────────────────────────────────
  build-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push auth
        run: |
          IMAGE="${{ secrets.ACR_NAME }}.azurecr.io/summarization-auth"
          docker build -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" ./auth-service
          docker push "${IMAGE}" --all-tags

  # ── Build & push frontend image ───────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend
        run: |
          IMAGE="${{ secrets.ACR_NAME }}.azurecr.io/summarization-frontend"
          docker build \
            -f frontend/Dockerfile \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            ./frontend
          docker push "${IMAGE}" --all-tags

  # ── Deploy all three to staging ───────────────────────────────────────────
  deploy-staging:
    needs: [build-backend, build-auth, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        continue-on-error: true
        id: oidc_login

      - name: Deploy backend to staging Container App
        if: steps.oidc_login.outcome == 'success'
        run: |
          az containerapp update \
            --name "${{ secrets.STAGING_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --container-name backend \
            --image "${{ secrets.ACR_NAME }}.azurecr.io/summarization-backend:${{ github.sha }}"

      - name: Deploy auth to staging Container App
        if: steps.oidc_login.outcome == 'success'
        run: |
          az containerapp update \
            --name "${{ secrets.STAGING_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --container-name auth-sidecar \
            --image "${{ secrets.ACR_NAME }}.azurecr.io/summarization-auth:${{ github.sha }}"

      - name: Deploy frontend to staging App Service
        if: steps.oidc_login.outcome == 'success'
        run: |
          az webapp config container set \
            --name "${{ secrets.STAGING_FRONTEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --docker-custom-image-name \
              "${{ secrets.ACR_NAME }}.azurecr.io/summarization-frontend:${{ github.sha }}" \
            --docker-registry-server-url "https://${{ secrets.ACR_NAME }}.azurecr.io" \
            --docker-registry-server-user "${{ secrets.ACR_USERNAME }}" \
            --docker-registry-server-password "${{ secrets.ACR_PASSWORD }}"

      - name: Sync staging frontend app settings
        if: steps.oidc_login.outcome == 'success'
        run: |
          az webapp config appsettings set \
            --name "${{ secrets.STAGING_FRONTEND_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --settings \
              BACKEND_URL="https://${{ secrets.STAGING_CONTAINER_APP_HOSTNAME }}" \
              WEBSITES_PORT=80

      - name: Workflow summary
        if: always()
        run: |
          SHA="${{ github.sha }}"
          ACR="${{ secrets.ACR_NAME }}.azurecr.io"
          {
            echo "## Build & Staging Deploy"
            echo ""
            echo "**SHA:** \`${SHA}\`"
            echo ""
            echo "| Image | Tag |"
            echo "|-------|-----|"
            echo "| \`${ACR}/summarization-frontend\` | \`${SHA}\` |"
            echo "| \`${ACR}/summarization-backend\` | \`${SHA}\` |"
            echo "| \`${ACR}/summarization-auth\` | \`${SHA}\` |"
            echo ""
            if [ "${{ steps.oidc_login.outcome }}" = "success" ] && [ "${{ job.status }}" = "Success" ]; then
              echo "**Staging deployment:** succeeded"
            elif [ "${{ steps.oidc_login.outcome }}" != "success" ]; then
              echo "**Staging deployment:** skipped — OIDC credentials not configured"
              echo ""
              echo "### Manual staging deploy (run from Cloud Shell)"
              echo '```bash'
              echo "SHA=${SHA}"
              echo "az containerapp update --name ${{ secrets.STAGING_CONTAINER_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} --container-name backend --image ${ACR}/summarization-backend:\${SHA}"
              echo "az containerapp update --name ${{ secrets.STAGING_CONTAINER_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} --container-name auth-sidecar --image ${ACR}/summarization-auth:\${SHA}"
              echo "az webapp config container set --name ${{ secrets.STAGING_FRONTEND_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --docker-custom-image-name ${ACR}/summarization-frontend:\${SHA} --docker-registry-server-url https://${{ secrets.ACR_NAME }}.azurecr.io --docker-registry-server-user ${{ secrets.ACR_USERNAME }} --docker-registry-server-password \$(az acr credential show --name ${{ secrets.ACR_NAME }} --query passwords[0].value -o tsv)"
              echo '```'
            else
              echo "**Staging deployment:** FAILED — check step logs above"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
