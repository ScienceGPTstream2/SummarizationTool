name: Deploy to A100 VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest repo
        run: |
          cd ~/SummarizationTool
          git fetch origin main
          git reset --hard origin/main

      - name: Install backend deps
        run: |
          cd ~/SummarizationTool/backend
          source ./venv/bin/activate
          pip install -r requirements.txt

      - name: Install frontend deps
        run: |
          cd ~/SummarizationTool
          npm ci

      - name: Build frontend
        run: |
          cd ~/SummarizationTool
          npm run build

      - name: Restart services
        run: |
          sudo systemctl restart summarization-backend
          sudo systemctl restart summarization-frontend

      - name: Health check
        run: |
          sleep 5
          sudo systemctl is-active summarization-backend
          sudo systemctl is-active summarization-frontend
